# Cloudflare Tunnel — ipTIME 포트포워딩 없이 공개 HTTPS API
# 사용: docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d
#
# 1) Cloudflare Zero Trust → Networks → Tunnels → Create tunnel
# 2) Public hostname: sgb.mansejin.com → http://sgb-gateway:8787
# 3) 터널 토큰을 .env 의 CLOUDFLARE_TUNNEL_TOKEN 에 넣기
# 4) 가비아 DNS: sgb CNAME → (대시보드에 표시된 xxx.cfargotunnel.com)

services:
  sgb-api:
    networks:
      - sgb-net

  sgb-gateway:
    networks:
      - sgb-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: saenggibu-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - sgb-gateway
    networks:
      - sgb-net

networks:
  sgb-net:
    driver: bridge
