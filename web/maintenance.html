<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">
  <title>점검 중 · 생기부 작성</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root,
    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f2f4f6;
      --card: #ffffff;
      --text: #191f28;
      --text-secondary: #6b7684;
      --blue: #3182f6;
      --border: #e5e8eb;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --blue: #58a6ff;
      --border: #30363d;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.35), 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 420px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .emoji {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 0.9375rem;
    }

    .hint {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }
  </style>
  <script>
    (function () {
      var s = localStorage.getItem("mansejin-theme");
      var d = s === "dark" || (s !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
    })();
  </script>
</head>
<body>
  <main class="card">
    <div class="emoji" aria-hidden="true">🔧</div>
    <h1>잠시 점검 중입니다</h1>
    <p>
      서버를 업데이트하고 있어요.<br>
      보통 1~2분 안에 다시 이용할 수 있습니다.
    </p>
    <p class="hint">
      잠시 후 <a href="/admin/saenggibu">새로고침</a> 해 주세요.<br>
      <a href="https://mansejin.com/">만세진</a>으로 돌아가기
    </p>
  </main>
</body>
</html>
